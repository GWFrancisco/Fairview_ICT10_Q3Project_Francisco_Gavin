<p>Have you applied online?</p>
<div class="row justify-content-center">
  <div class="col-auto">
    <label><input type="radio" name="registration" id="REGSITERAPPROVED"> Yes</label>
  </div>

  </div>
</div>
<br>
<p>Do you have the medical clearance from the clinic?</p>
<div class="row justify-content-center">

    <label><input type="radio" name="medical" id="medicalyes"> Yes</label>
  </div>
  <div class="col-auto">

  </div>
</div>
<br>
<p>Grade & Section</p>
<div class="row justify-content-center g-3">

    <select id="grade" class="form-select">
      <option value="">-- select grade --</option>

      <option value="9">9</option>
      <option value="10">10</option>
    </select>
  </div>
<br>

    <select id="section" class="form-select">
      <option value="">-- select section --</option>
      <option value="emerald">Emerald</option>
      <option value="sapphire">Sapphire</option>
      <option value="topaz">Topaz</option>
      <option value="ruby">Ruby</option>
      <option value="jade">Jade</option>
    </select>
  </div>
</div>
